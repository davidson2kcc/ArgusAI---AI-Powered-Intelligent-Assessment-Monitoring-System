<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assessment Monitor</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="login-page">
        <div class="login-card">
            <h1 class="login-card__title">AI Assessment Monitor</h1>
            <p class="login-card__subtitle">Enter your details to begin the assessment</p>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="studentId">Student ID</label>
                    <input type="text" id="studentId" name="studentId" placeholder="e.g. STU-001" autocomplete="off">
                    <p class="error-text" id="studentIdError">Student ID is required.</p>
                </div>

                <div class="form-group">
                    <label for="studentName">Student Name</label>
                    <input type="text" id="studentName" name="studentName" placeholder="e.g. Jane Doe" autocomplete="off">
                    <p class="error-text" id="studentNameError">Student Name is required.</p>
                </div>

                <button type="submit" class="btn btn--primary" id="startBtn">Start Assessment</button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
